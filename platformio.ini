[env:mega_wifi]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_ldf_mode = deep
lib_deps =
    adafruit/Adafruit BusIO
    prenticedavid/MCUFRIEND_kbv
    https://github.com/DIYables/DIYables_TFT_Shield.git
    adafruit/Adafruit GFX Library
    arduino-libraries/SD

monitor_speed = 115200
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

[env:megaADK]
platform = atmelavr
board = megaADK
framework = arduino
lib_ldf_mode = deep
lib_deps =
    adafruit/Adafruit BusIO
    prenticedavid/MCUFRIEND_kbv
    https://github.com/DIYables/DIYables_TFT_Shield.git
    adafruit/Adafruit GFX Library
    arduino-libraries/SD
    
; build_flags =
;    -x delay=100

upload_flags = 
    -D
    
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0